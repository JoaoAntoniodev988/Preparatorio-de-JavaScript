<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanTech Tracker</title>
    <link rel="stylesheet" href="estilo.css">
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/c99245ec2d.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <h1>FinanTech <span>Tracker</span></h1>
        <p>Seu controle financeiro inteligente</p>
    </header>

    <main>
        <!-- Secção de Resumo Financeiro -->
        <section id="balance-section">
            <h2 class="sr-only">Resumo de Saldos</h2>

            <!-- Cartão: Entrada -->
            <div class="entrada">
                <h3>Ativos</h3>
                <p id="income-display">0,00 AOA</p>
            </div>

             <!-- Cartão: Saídas -->
            <div class="saida">
                <h3>Passivos</h3>
                <p id="expense-display">0,00 AOA</p>
            </div>

             <!-- Cartão: Total -->
            <div class="saldototal">
                <h3>Saldo Atual</h3>
                <p id="total-display">0,0 AOA</p>
            </div>
        </section>

        <!-- Seção do Formulário -->
        <section id="form-section">
            <h2>Nova Transação</h2>
            <form id="transaction-form">

                <div class="input-group">
                    <label for="description">Descrição</label>
                    <input type="text" id="description" placeholder="Ex: Salário, Supermercado" required>
                </div>

               <div class="input-group">
                    <label for="amount">Valor</label>
                    <input type="text" id="amount" placeholder="0,00" required>
                    <small>Use o sinal - (menos) para despesas/gastos.</small>
                </div>

                <button type="submit">Adicionar Transação</button>
            </form>
        </section>

        <!-- Seção do Histórico -->
        <section id="history-section">
            <h2>Histórico de Transações</h2>

            <table id="data-table">
                <thead>
                    <tr>
                        <th>Descrição</th>
                        <th>Valor</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="transaction-container">
                    <!-- O JavaScript vai invejar as linhas (<tr>) aqui dinamicamente-->
                </tbody>
            </table>
        </section>
    </main> <!-- Fechamento do conteúdo principal -->

    <script src="script.js"></script>
</body>
</html>
