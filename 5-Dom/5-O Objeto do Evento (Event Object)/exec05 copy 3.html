<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="radar" style="width: 100%; height: 300px; background: #222; color: lime; padding: 20px;">
    Move o rato aqui dentro...
</div>

    <script>
        const radar = document.getElementById("radar");

        radar.addEventListener("mousemove", (e) => {
            const x = e.clientX;
            const y = e.clientY;

            radar.textContent = `X: ${x} | Y: ${y}`;
        })
    </script>
</body>
</html>
