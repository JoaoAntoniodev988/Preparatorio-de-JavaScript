<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="campo-texto" placeholder="Digita algo e prime Enter...">

    <script>
        const input = document.getElementById("campo-texto");
        input.addEventListener("keyup", (e) => {
            if (e.key === "Enter") {
                console.log("Submetido! Tu escreveste: " + e.target.value);
            }
        })
    </script>
</body>
</html>
